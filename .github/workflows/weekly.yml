name: Weekly agent notice

"on":
  workflow_dispatch: {}
  schedule:
    - cron: "0 1 * * 0"

permissions:
  contents: write
jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      QQ_SMTP_USER: ${{ secrets.QQ_SMTP_USER }}
      QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: python -m agent_notice.app weekly
      - name: Commit generated report
        run: |
          git add reports
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "docs: add weekly agent report"
            git push
          fi
